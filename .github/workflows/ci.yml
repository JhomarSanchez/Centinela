# CI pipeline: lint + tests, Docker image build, and Kubernetes manifest
# validation on every push and pull request.
#
# Tests run against in-memory SQLite (see backend/tests/conftest.py), so the
# pipeline needs no database service and finishes fast.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -v

  docker-build:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      # Build-only: publishing to a registry is an optional later step.
      # This still catches Dockerfile breakage before it reaches main.
      - name: Build image
        run: docker build -t centinela-backend:ci ./backend

  validate-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # kubectl kustomize renders the full stack; a broken manifest or
      # kustomization fails the build without needing a cluster.
      - name: Render kustomize overlays
        run: |
          kubectl kustomize k8s/base > /dev/null
          kubectl kustomize k8s/overlays/local > /dev/null
