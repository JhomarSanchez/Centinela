# CI pipeline: lint + tests, Docker image build, and Kubernetes manifest
# validation on every push and pull request.
#
# Backend tests use in-memory SQLite; a separate browser job starts a disposable
# SQLite API and never calls live AI providers.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -v

  frontend:
    name: Frontend contract, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend and frontend dependencies
        run: |
          pip install -r backend/requirements.txt
          npm ci --prefix frontend

      - name: Verify generated API contract
        env:
          SCHEDULER_ENABLED: "false"
          OLLAMA_ENABLED: "false"
        run: |
          python backend/scripts/export_openapi.py frontend/openapi.json
          npm run generate:api --prefix frontend
          git diff --exit-code

      - name: Type-check, test, and build frontend
        run: |
          npm run lint --prefix frontend
          npm run test --prefix frontend
          npm run build --prefix frontend

  browser-acceptance:
    name: Browser acceptance
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install test dependencies
        run: |
          pip install -r backend/requirements-dev.txt
          npm ci --prefix frontend
          npm --prefix frontend exec -- playwright install --with-deps chromium

      - name: Run browser flow
        run: npm run e2e --prefix frontend

  docker-build:
    name: Build application images
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend]
    steps:
      - uses: actions/checkout@v4

      # Build-only: publishing to a registry is an optional later step.
      # This still catches Dockerfile breakage before it reaches main.
      - name: Build image
        run: |
          docker build -t centinela-backend:ci ./backend
          docker build -t centinela-frontend:ci ./frontend

  validate-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # kubectl kustomize renders the full stack; a broken manifest or
      # kustomization fails the build without needing a cluster.
      - name: Render kustomize overlays
        run: |
          kubectl kustomize k8s/base > /dev/null
          kubectl kustomize k8s/overlays/local > /dev/null
          kubectl kustomize k8s/overlays/local-ollama > /dev/null
