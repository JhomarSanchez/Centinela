# Tool configuration for the backend (linter and test runner).

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/F: pycodestyle + pyflakes basics, I: import sorting, UP: modern syntax, B: common bug patterns.
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
# conftest.py sets environment variables before importing the app on purpose.
"tests/conftest.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Make the `app` package importable when running pytest from backend/.
pythonpath = ["."]
