# Optional local overlay with the Ollama workload enabled.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: centinela

resources:
  - ../local
  - ../../base/ollama.yaml

configMapGenerator:
  - name: centinela-config
    behavior: merge
    literals:
      - OLLAMA_ENABLED=true
